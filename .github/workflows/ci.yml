name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Check formatting
        run: ruff format --check src tests scripts

      - name: Lint
        run: ruff check src tests scripts

      - name: Test
        run: pytest --cov=vegetable_vision --cov-report=term-missing

  notebook-integrity:
    name: Notebook Integrity
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify split notebooks are current
        run: python scripts/split_notebook.py --check

  security:
    name: Security
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install security tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Bandit static analysis
        run: bandit -q -r src scripts

      - name: Dependency audit
        run: |
          pip-audit -r requirements-dev.txt --skip-editable --progress-spinner off
          pip-audit -r requirements.txt --skip-editable --progress-spinner off
