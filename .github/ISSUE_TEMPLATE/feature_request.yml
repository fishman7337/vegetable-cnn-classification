name: Feature request
description: Suggest an improvement to the project.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What need or limitation does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the change you would like.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: How should this be tested or documented?
